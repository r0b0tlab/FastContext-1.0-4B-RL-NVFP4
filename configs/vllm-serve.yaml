# vLLM NVFP4 serving reference for FastContext-1.0-4B-RL-NVFP4
# Use with: ./configs/vllm-serve.sh  OR  vllm serve <flags below>

model: r0b0tlab/FastContext-1.0-4B-RL-NVFP4
quantization: modelopt
dtype: auto
tensor_parallel_size: 1
trust_remote_code: true

attention_backend: flashinfer
kv_cache_dtype: fp8

gpu_memory_utilization: 0.40
max_model_len: 131072
max_num_seqs: 16
max_num_batched_tokens: 8192
enable_chunked_prefill: true

enable_auto_tool_choice: true
tool_call_parser: hermes

host: 0.0.0.0
port: 30000
served_model_name: FastContext-1.0-4B-RL-NVFP4